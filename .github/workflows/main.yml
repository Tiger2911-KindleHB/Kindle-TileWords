name: Build TileWords KUAL Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-kindlehf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y zip wget ca-certificates make

      - name: Cache KindleHF toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/x-tools/arm-kindlehf-linux-gnueabihf
          key: koxtoolchain-kindlehf-2025-05

      - name: Download KindleHF toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz -O /tmp/kindlehf.tar.gz
          tar -xzf /tmp/kindlehf.tar.gz -C "$HOME"

      - name: Add toolchain to PATH
        run: |
          echo "$HOME/x-tools/arm-kindlehf-linux-gnueabihf/bin" >> "$GITHUB_PATH"
          ls "$HOME/x-tools/arm-kindlehf-linux-gnueabihf/bin"

      - name: Build native binary
        run: |
          make clean
          make CC=arm-kindlehf-linux-gnueabihf-gcc

      - name: Package KUAL extension
        run: |
          make package
          unzip -l dist/tilewords-kual.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilewords-kual
          path: dist/tilewords-kual.zip
          if-no-files-found: error
