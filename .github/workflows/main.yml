name: Build TileWords for Kindle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-kindlehf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ca-certificates curl wget tar zip \
            meson ninja-build pkg-config python3

      - name: Build Kindle binary
        run: |
          bash ./scripts/build-kindlehf.sh

      - name: Package KUAL extension
        run: |
          bash ./scripts/package-kual.sh ./builddir_kindlehf/tilewords
          unzip -l dist/tilewords-kual.zip

      - name: Upload KUAL artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilewords-kual
          path: dist/tilewords-kual.zip
          if-no-files-found: error
